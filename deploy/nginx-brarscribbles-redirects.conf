# 301 map: superseded URLs -> their current equivalents.
#
# Two generations of old URLs point here:
#   1. The WooCommerce site's URLs, still in Google's index and in backlinks.
#   2. The short-lived /product/<id> URLs published earlier today, which were
#      submitted in a sitemap and may already be crawled.
#
# Product slugs were deliberately carried over from WooCommerce unchanged, so
# old product URLs differ only by a trailing slash. Those are NOT listed here —
# a rule like "/product/motion/? -> /product/motion" also matches its own
# target and loops forever. The server block strips trailing slashes instead.
#
# Included from the http context. $redirect_uri is empty when nothing matches.

map $request_uri $redirect_uri {
    default "";

    # --- Numeric product URLs (published briefly) -> canonical slugs ---
    ~^/product/1/?$  /product/projectile-motion-formulae-sheets-class-11th-advance-level;
    ~^/product/2/?$  /product/chemical-reactions-equations-synopsis-class-10th;
    ~^/product/3/?$  /product/motion;
    ~^/product/4/?$  /product/electric-charges-fields-formulae-sheet-class-12th;
    ~^/product/5/?$  /product/handbook-of-physics-formulaesale;
    ~^/product/6/?$  /product/electricity-formula-sheet;
    ~^/product/7/?$  /product/trends-modern-periodic-table;
    ~^/product/8/?$  /product/coffee-mug-ionic-bonding-a-love-story;

    # --- WooCommerce category archives -> filtered shop ---
    ~^/product-category/physics-study-material/?$                /shop?cat=physics%20study%20material;
    ~^/product-category/chemistry-study-material/?$              /shop?cat=chemistry%20study%20material;
    ~^/product-category/study-material/biology-study-material/?$ /shop?cat=biology%20study%20material;
    ~^/product-category/biology-study-material/?$                /shop?cat=biology%20study%20material;
    ~^/product-category/science-inspired-mugs/?$                 /shop?cat=science%20inspired%20mugs;
    ~^/product-category/creative-coffee-mugs/?$                  /shop?cat=science%20inspired%20mugs;
    ~^/product-category/inspirational-coffee-mugs/?$             /shop?cat=science%20inspired%20mugs;
    ~^/product-category/sale/?$                                  /shop?cat=sale;
    ~^/product-category/                                         /shop;

    # --- Static pages ---
    ~^/about-us/?$      /about;
    ~^/blog-2/?$        /blog;
    ~^/social-media/?$  /contact;
    ~^/cart/?$          /checkout;
    ~^/my-account/?$    /login;

    # --- WordPress leftovers ---
    ~^/feed/?$           /;
    ~^/comments/feed/?$  /;
    ~^/wp-sitemap.xml$   /sitemap.xml;
    ~^/wp-json/          /;
}
