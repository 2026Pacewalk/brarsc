# 301 map: old WooCommerce URLs -> new SPA routes.
#
# The previous site was WordPress/WooCommerce and those URLs are still in
# Google's index and in any existing backlinks. Without these, every one of
# them returns the SPA shell with a 200 — a soft 404 that silently drops the
# accumulated ranking signal instead of passing it to the new page.
#
# Included from the http context; referenced by the site's server block.
# $new_uri is empty when nothing matches, which the server block treats as
# "not an old URL, carry on".

map $request_uri $redirect_uri {
    default "";

    # --- Products (old keyword slug -> new numeric id) ---
    ~^/product/projectile-motion-formulae-sheets-class-11th-advance-level/?         /product/1;
    ~^/product/chemical-reactions-equations-synopsis-class-10th/?                   /product/2;
    ~^/product/motion/?                                                             /product/3;
    ~^/product/electric-charges-fields-formulae-sheet-class-12th/?                  /product/4;
    ~^/product/handbook-of-physics-formulaesale/?                                   /product/5;
    ~^/product/electricity-formula-sheet/?                                          /product/6;
    ~^/product/trends-modern-periodic-table/?                                       /product/7;
    ~^/product/coffee-mug-ionic-bonding-a-love-story/?                              /product/8;

    # --- Category archives -> filtered shop ---
    ~^/product-category/physics-study-material/?      /shop?cat=physics%20study%20material;
    ~^/product-category/chemistry-study-material/?    /shop?cat=chemistry%20study%20material;
    ~^/product-category/study-material/biology-study-material/?  /shop?cat=biology%20study%20material;
    ~^/product-category/biology-study-material/?      /shop?cat=biology%20study%20material;
    ~^/product-category/science-inspired-mugs/?       /shop?cat=science%20inspired%20mugs;
    ~^/product-category/creative-coffee-mugs/?        /shop?cat=science%20inspired%20mugs;
    ~^/product-category/inspirational-coffee-mugs/?   /shop?cat=science%20inspired%20mugs;
    ~^/product-category/sale/?                        /shop?cat=sale;
    ~^/product-category/study-material/?              /shop;
    ~^/product-category/acrylic-blocks/?              /shop;
    ~^/product-category/apparel/?                     /shop;
    ~^/product-category/art/?                         /shop;
    ~^/product-category/keychains-and-car-hangings/?  /shop;
    ~^/product-category/plushies-and-pillow-covers/?  /shop;
    ~^/product-category/posters-prints/?              /shop;
    ~^/product-category/science-toys-and-activity-kits/?  /shop;
    ~^/product-category/stickers-magnets-pins/?       /shop;
    ~^/product-category/?$                            /shop;

    # --- Static pages ---
    ~^/about-us/?      /about;
    ~^/blog-2/?        /blog;
    ~^/contact/?$      /contact;
    ~^/gallery/?$      /gallery;
    ~^/social-media/?  /contact;
    ~^/cart/?          /checkout;
    ~^/my-account/?    /login;

    # --- WordPress leftovers: dead endpoints, no new equivalent ---
    ~^/feed/?              /;
    ~^/comments/feed/?     /;
    ~^/wp-sitemap.xml$     /sitemap.xml;
}
