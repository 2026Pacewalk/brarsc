# Temporary HTTP-only config, used only to obtain the first certificate.
# The real config (nginx-brarscribbles.conf) references cert files that do not
# exist yet, so `nginx -t` would fail and block a reload — which on this shared
# box would also stall config changes for the other sites. Serve plain HTTP
# first, let certbot validate, then swap in the real config.

server {
    listen 80;
    listen [::]:80;
    server_name brarscribbles.com www.brarscribbles.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    root /var/www/brarscribbles;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
