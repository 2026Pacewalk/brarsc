# /etc/nginx/sites-available/brarscribbles.com
# Static SPA served from /var/www/brarscribbles, fronted by Cloudflare.
#
# This box hosts ~19 other production sites. Everything here is scoped inside
# the server blocks on purpose: real_ip directives placed at file level land in
# the http context and would change $remote_addr for every other site too.

server {
    listen 80;
    listen [::]:80;
    server_name brarscribbles.com www.brarscribbles.com;

    # Cloudflare passes ACME challenges through to the origin.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect to the apex, NOT to $host. Cloudflare reaches this box over plain
    # HTTP for www (a per-hostname Flexible-SSL rule in the zone) while using
    # HTTPS for the apex. With $host, www would redirect to https://www..., which
    # Cloudflare again forwards here over port 80 — an infinite loop. Sending
    # www to the apex escapes it, and canonicalises on one hostname either way.
    location / {
        return 301 https://brarscribbles.com$request_uri;
    }
}

# www over HTTPS -> apex, so both schemes canonicalise to one hostname.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.brarscribbles.com;

    ssl_certificate     /etc/letsencrypt/live/brarscribbles.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brarscribbles.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://brarscribbles.com$request_uri;
}

server {
    # No http2 here, deliberately. It is a per-socket protocol option, and the
    # other sites on this box use plain "listen 443 ssl" — adding it triggers
    # "protocol options redefined" warnings and changes the shared 443 socket
    # for all of them. Cloudflare terminates HTTP/2 with the visitor and speaks
    # HTTP/1.1 to the origin anyway, so there is nothing to gain.
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name brarscribbles.com;

    ssl_certificate     /etc/letsencrypt/live/brarscribbles.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brarscribbles.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Restore real visitor IPs from the Cloudflare edge. Scoped to this site.
    # Refresh from https://www.cloudflare.com/ips/ if the ranges change.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    root /var/www/brarscribbles;
    index index.html;

    # Old WooCommerce URLs still in Google's index -> their new equivalents.
    # $redirect_uri comes from the map in conf.d/brarscribbles-redirects.conf
    # and is empty for everything else. "if" with a bare return is one of the
    # documented-safe uses of if in server context.
    if ($redirect_uri != "") {
        return 301 $redirect_uri;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Vite emits content-hashed filenames, so these are safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # index.html must never be cached, or clients pin to a stale asset manifest.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # BrowserRouter: unknown paths are client-side routes, not 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
